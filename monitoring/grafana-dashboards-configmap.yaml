apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-availability.json: |-
    {
      "uid": "nexus-app-availability",
      "title": "Nexus App - Pod Availability",
      "tags": ["nexus", "availability"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Available Replicas",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_status_replicas_available{namespace=\"nexus\",deployment=\"nexus-app\"}",
              "legendFormat": "available"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      }
    }
  pod-restarts.json: |-
    {
      "uid": "nexus-app-restarts",
      "title": "Nexus App - Pod Restarts",
      "tags": ["nexus", "restarts"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Restart Count (5m increase)",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"nexus\",container=\"nexus-app\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      }
    }
  resource-usage.json: |-
    {
      "uid": "nexus-app-resources",
      "title": "Nexus App - CPU/Memory Usage",
      "tags": ["nexus", "resources"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU Usage (cores)",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"nexus\",container=\"nexus-app\"}[5m]))",
              "legendFormat": "cpu"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory Usage (bytes)",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"nexus\",container=\"nexus-app\"})",
              "legendFormat": "memory"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      }
    }
  replica-status.json: |-
    {
      "uid": "nexus-app-replicas",
      "title": "Nexus App - Desired vs Running",
      "tags": ["nexus", "replicas"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Desired vs Available Replicas",
          "datasource": "${DS_PROMETHEUS}",
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_spec_replicas{namespace=\"nexus\",deployment=\"nexus-app\"}",
              "legendFormat": "desired"
            },
            {
              "refId": "B",
              "expr": "kube_deployment_status_replicas_available{namespace=\"nexus\",deployment=\"nexus-app\"}",
              "legendFormat": "available"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      }
    }