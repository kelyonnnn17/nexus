apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-app
  namespace: nexus
  labels:
    app: nexus-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-app
  template:
    metadata:
      labels:
        app: nexus-app
    spec:
      containers:
      - name: nexus-app
        image: kelyonnnn17/nexus-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5050
        env:
        - name: VERSION
          value: "v1"
        - name: BG_COLOR
          value: "green"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5050
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3